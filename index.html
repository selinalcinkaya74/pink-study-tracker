<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pink Study Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <h1>🌸 Pink Study Tracker</h1>
      <button id="themeToggle">🌙</button>
    </div>

    <p id="taskCounter">0/0 completed</p>

    <div class="input-area">
      <input type="text" id="taskInput" placeholder="Task yaz...">
      <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
